<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="assets/github-logo.png"
      type="image/x-icon"
    />
    <!-- style -->
    <link rel="stylesheet" href="style.css" />
    <!-- tailwind & daisyUI-->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome library  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- font for this page  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="md:bg-[#F8FAFC]">
    <!-- sign in and sign up -->
    <section
      class="max-w-[520px] min-h-screen mx-auto flex flex-col justify-center items-center hidden"
    >
      <!-- sign in container -->
      <div class="md:shadow-md md:rounded-2xl p-8 bg-white w-full">
        <!-- top -->
        <div class="flex flex-col justify-center items-center">
          <img
            class="w-[100px] mb-6"
            src="assets/github-logo.png"
            alt="github-logo"
          />
          <h1 class="mb-1 font-semibold text-[24px]">GitHub Issues Tracker</h1>
          <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>
        <!-- middle -->
        <div class="w-full">
          <div class="border-base-300 w-full">
            <label for="userName" class="label text-[#1F2937] mb-2"
              >Username</label
            >
            <input
              id="userName"
              type="text"
              class="input w-full mb-4"
              placeholder="Enter Username"
            />

            <label for="password" class="label text-[#1F2937] mb-2"
              >Password</label
            >
            <input
              type="password"
              class="input w-full"
              placeholder="Enter Password"
            />

            <button class="btn btn-primary mt-4 w-full rounded-md text-white">
              Sign In
            </button>
          </div>
        </div>
        <!-- last -->
        <div class="w-full mt-6">
          <div
            class="flex justify-center items-center flex-row w-full gap-2 font-semibold"
          >
            <hr class="border-gray-300 w-full" />
            OR
            <hr class="border-gray-300 w-full" />
          </div>
          <div class="flex flex-col justify-center items-center mt-6">
            <h2>Demo Credentials:</h2>
            <div
              class="bg-[#F8FAFC] py-6 flex flex-col justify-center items-center rounded-xl mt-2 w-full"
            >
              <p>
                <span class="text-[#1F2937] font-bold">Username</span>: admin
              </p>
              <p>
                <span class="text-[#1F2937] font-bold">Password</span>: admin123
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- main section -->
    <main class="mx-auto bg-[#F8FAFC]">
      <!-- header -->
      <header class="w-full mx-auto bg-white shadow sticky top-0">
        <div class="navbar w-11/12 bg-white mx-auto">
          <div class="flex-1">
            <div class="flex flex-row justify-start items-center gap-3">
              <img class="w-9" src="assets/github-logo.png" alt="" />
              <a class="text-[15px] font-semibold md:text-[22px]"
                >GitHub Issues Tracker</a
              >
            </div>
          </div>
          <div class="flex gap-2">
            <div class="relative">
              <i
                class="fa-solid fa-magnifying-glass absolute left-2 top-3 z-10"
              ></i>
              <input
                type="text"
                placeholder="Search Issue"
                class="input input-bordered w-24 md:w-auto pl-8"
              />
            </div>
            <div class="dropdown dropdown-end flex justify-center items-center">
              <button class="btn btn-primary">
                <i class="fa-solid fa-plus"></i>
                New Issue
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- 3 button section -->
      <section
        class="container mx-auto p-6 shadow bg-white rounded-md mt-[60px] mb-4"
      >
        <div class="space-x-2">
          <button class="btn btn-primary px-12">All</button>
          <button class="btn px-12">Open</button>
          <button class="btn px-12">Closed</button>
        </div>
      </section>
      <!-- hero -->
      <section class="container mx-auto">
        <!-- 50 Issues -->
        <div
          class="flex flex-row justify-between items-center p-6 shadow rounded-md bg-white mb-4"
        >
          <!-- left section -->
          <div class="gap-3 flex flex-row justify-center items-center">
            <div
              class="w-[50px] h-[50px] rounded-full bg-[#ECE4FF] flex justify-center items-center"
            >
              <img class="w-8" src="assets/Aperture.png" alt="Aperture-logo" />
            </div>
            <div>
              <h3 class="font-semibold text-[20px] mb-1">50 Issue</h3>
              <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>
          <!-- right section -->
          <div class="flex flex-row gap-4">
            <div class="flex flex-row justify-center items-center space-x-2">
              <i class="fa-solid fa-circle text-green-600"></i>
              <p>Open</p>
            </div>
            <div class="flex flex-row justify-center items-center space-x-2">
              <i class="fa-solid fa-circle text-purple-500"></i>
              <p>Closed</p>
            </div>
          </div>
        </div>
        <!-- card container -->
        <div></div>
      </section>
    </main>

    <script src="script/script.js"></script>
  </body>
</html>
